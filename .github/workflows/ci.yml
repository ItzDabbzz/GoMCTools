name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Run Linter
        uses: golangci-lint/golangci-lint-action@v4
        with:
          version: latest
          # Optionally add: skip-cache: true if you run into caching issues

      - name: Build
        run: go build -v -o gomctools .

      - name: Run tests
        run: go test -v ./...

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gomctools-binary
          path: gomctools
